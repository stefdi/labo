{% load static %}
<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <title>Архив всех статей</title>
    <link rel="stylesheet" href="{% static 'css/article.css' %}">
  </head>
  <body>

    <div class="header">
      <div class="header-container"> 
        <img class="logo" src="{% static 'img/dpb-logo.png' %}" alt="logo"/>

        <div class="header-text-area">
          <p class="service-title">Коллективный блог</p>
          <a href="/register/" class="register-link">Регистрация</a>
          <a href="/login/" class="register-link">Вход</a>
        </div>

        <div class="icons-for-parallax">
          <img class="icon-for-parallax-first" src="{% static 'img/article-icon-for-parallax.png' %}" alt="">
          <img class="icon-for-parallax-second" src="{% static 'img/article-icon-for-parallax.png' %}" alt="">
          <img class="icon-for-parallax-third" src="{% static 'img/article-icon-for-parallax.png' %}" alt="">
        </div>
      </div>
    </div>

    <div class="archive">
      <div class="article-top-link">
        <a href="/">Все статьи</a>
      </div>

      {% for post in posts %}
      <div class="one-post">
        <div class="one-post-shadow"></div>

        <h2 class="post-title">
          <a href="/article/{{ post.id }}/">{{ post.title }}</a>
          <a href="#" class="fold-button">свернуть</a>
        </h2>

        <div class="article-info">
          <div class="article-author">{{ post.author.username }}</div>
          <div class="article-created-date">{{ post.created_date }}</div>
        </div>

        <p class="article-text">{{ post.get_excerpt }}</p>
      </div>
      {% endfor %}
    </div>

    <script src="{% static 'js/jquery.js' %}"></script>
    <script src="{% static 'js/parallax.js' %}"></script>
    <script src="{% static 'js/helloworld.js' %}"></script>
    <script src="{% static 'js/fold-post.js' %}"></script>
    <script src="{% static 'js/highlight-post.js' %}"></script>
  </body>
</html>
